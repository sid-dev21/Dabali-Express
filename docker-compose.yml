services:
  mongo:
    image: mongo:7
    container_name: dabali-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dabali-backend
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/dabali-express
      PORT: 5000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3001
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend_web
      dockerfile: Dockerfile
    container_name: dabali-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3001:3001"

volumes:
  mongo_data:

